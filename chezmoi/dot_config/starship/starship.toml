# Get editor completions based on the config schema
# "$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true
# CUSTOM CONFIG
# ---------------------------------
format      = """
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$git_metrics\
$nodejs\
$bun\
$nix_shell\
$fill\
$line_break\
$character"""

# $time\

# [custom.jj]
#   command        = "prompt"
#   format         = "$output"
#   ignore_timeout = true
#   shell          = ["starship-jj", "--ignore-working-copy", "starship"]
#   use_stdin      = false
#   when           = true

# Replace the 'ÔØ»' symbol in the prompt with 'ÔŞ£'
[character]
	error_symbol   = "[ÔŞ£](bold red)"
	success_symbol = "[ÔŞ£](bold green)"

[time]
	disabled        = false
	format          = "[$time]($style) "
	style           = "bold gray"
	time_format     = "%T"                # 24 Hour format HH:mm:ss
	use_12hr        = false
	utc_time_offset = "+7"                # Timezone

[fill]
	symbol = " "

[jobs]
	format           = "[$symbol]($style)"
	number_threshold = 1
	style            = "bold red"
	symbol           = "´Çô"

[git_state]
	format = '\([$state( $progress_current/$progress_total)]($style)\) '
	style  = "bright-black"

[git_metrics]
	disabled = false  # Git metrics, example +21 -8

[cmd_duration]
	format = "[$duration]($style)"
	style  = "yellow"

[custom.stunnel]
	command = "ps -o etime= -p $(ps aux | grep stunnel | grep -v grep | awk '{print $2}')"
	format  = "[TUNNEL OPEN for $output]($style)"
	style   = "red"
	when    = "ps aux | grep stunnel | grep -v grep"

